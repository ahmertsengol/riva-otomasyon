{% extends "base.html" %}
{% block auth_content %}
<div class="min-h-screen grid place-items-center bg-gradient-to-br from-brand-50 via-surface to-slate-100 px-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-6">
      {% if clinic.logo %}
        <img src="{{ clinic.logo.url }}" alt="{{ clinic.name }}" class="h-20 w-20 rounded-2xl object-contain shadow-lg shadow-slate-300/40">
      {% else %}
        <div class="h-14 w-14 rounded-2xl bg-brand-600 text-white grid place-items-center text-2xl font-bold shadow-lg shadow-brand-600/20">R</div>
      {% endif %}
      <h1 class="mt-3 text-lg font-semibold text-slate-900">{% block auth_title %}{% endblock %}</h1>
      <p class="text-sm text-slate-500 text-center">{% block auth_subtitle %}{% endblock %}</p>
    </div>
    <div class="card card-pad">
      {% block auth_body %}{% endblock %}
    </div>
    <div class="mt-4 text-center">
      <a href="{% url 'accounts:login' %}" class="text-sm text-slate-500 hover:text-brand-700">← Girişe dön</a>
    </div>
  </div>
</div>
{% endblock %}
