{# Sahip seçimi (telefon/ad ile aranıp doldurulur). Seçilince hayvan listesini filtreler. #}
<select name="owner" id="id_owner" class="select"
        hx-get="/hayvanlar/secenekler/" hx-target="#patient-field" hx-swap="innerHTML" hx-trigger="change">
  <option value="">{% if searched %}— Sahip seç (yoksa aşağıdan yeni gir) —{% else %}Telefon/ad ile ara veya yeni sahip gir{% endif %}</option>
  {% for o in owners %}
  <option value="{{ o.pk }}" {% if selected == o.pk|stringformat:"s" %}selected{% endif %}>{{ o.full_name }} · {{ o.phone }}</option>
  {% endfor %}
</select>
