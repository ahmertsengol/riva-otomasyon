{% if messages %}
<div class="space-y-2 mb-4" x-data>
  {% for message in messages %}
  <div class="flex items-start gap-2 rounded-lg px-4 py-3 text-sm border
       {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
       {% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
       {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
       {% else %}bg-sky-50 border-sky-200 text-sky-800{% endif %}"
       x-show="true" x-init="setTimeout(() => $el.remove(), 6000)">
    <span class="flex-1">{{ message }}</span>
    <button @click="$el.parentElement.remove()" class="text-current/60 hover:text-current">✕</button>
  </div>
  {% endfor %}
</div>
{% endif %}
