{% extends "base.html" %}
{% block title %}Tıbbi Not · {{ clinic.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-2 mb-5">
    <a href="{% url 'patients:detail' note.patient.pk %}" class="btn btn-ghost px-2">‹</a>
    <div>
      <h1 class="page-title">Tıbbi Not</h1>
      <p class="text-sm text-slate-500">{{ note.created_at|date:"d F Y, H:i" }}</p>
    </div>
  </div>

  <div class="card card-pad">
    <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
      <div>
        <div class="font-semibold text-slate-900">{{ note.patient.name }}</div>
        <div class="text-sm text-slate-500">{{ note.patient.owner.full_name }}</div>
      </div>
      <span class="badge badge-neutral">Not</span>
    </div>
    <p class="text-sm text-slate-800 whitespace-pre-line">{{ note.body }}</p>
  </div>
</div>
{% endblock %}
