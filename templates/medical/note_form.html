{% extends "base.html" %}
{% block title %}Yeni Tıbbi Not · {{ clinic.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-2 mb-5">
    <a href="{% if form.initial.patient %}{% url 'patients:detail' form.initial.patient %}{% else %}{% url 'medical:examination_list' %}{% endif %}" class="btn btn-ghost px-2">‹</a>
    <h1 class="page-title">Yeni Tıbbi Not</h1>
  </div>

  <form method="post" class="card card-pad space-y-4">
    {% csrf_token %}
    {% include "partials/_field.html" with field=form.patient %}
    {% include "partials/_field.html" with field=form.body %}
    <div class="flex gap-2 justify-end border-t border-slate-100 pt-4">
      <a href="{% url 'medical:examination_list' %}" class="btn btn-secondary">İptal</a>
      <button type="submit" class="btn btn-primary">Kaydet</button>
    </div>
  </form>
</div>
{% endblock %}
