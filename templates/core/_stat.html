{# Panel özet kartı. Parametreler: label, value, icon, tone, href?, money? #}
{% spaceless %}
{% if href %}<a href="{{ href }}" class="block">{% endif %}
<div class="card p-4 hover:shadow-md transition-shadow {% if href %}cursor-pointer{% endif %}">
  <div class="flex items-center justify-between">
    <span class="text-xs font-medium text-slate-500">{{ label }}</span>
    <span class="h-7 w-7 rounded-lg grid place-items-center
      {% if tone == 'brand' %}bg-brand-50 text-brand-600
      {% elif tone == 'success' %}bg-emerald-50 text-emerald-600
      {% elif tone == 'warning' %}bg-amber-50 text-amber-600
      {% elif tone == 'danger' %}bg-red-50 text-red-600
      {% elif tone == 'info' %}bg-sky-50 text-sky-600
      {% else %}bg-slate-100 text-slate-500{% endif %}">
      {% include "partials/_icon.html" with name=icon %}
    </span>
  </div>
  <div class="mt-2 text-2xl font-semibold text-slate-900">
    {% if money %}{{ value|floatformat:0 }} ₺{% else %}{{ value }}{% endif %}
  </div>
</div>
{% if href %}</a>{% endif %}
{% endspaceless %}
