# Kaynaktan DERLEYEREK çalıştırma (geliştirme / internetsiz ilk kurulum / yedek).
# Klinik oto-güncellemeli kurulum için varsayılan docker-compose.yml kullanın.
#   docker compose -f docker-compose.build.yml up -d --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: riva
      POSTGRES_USER: riva
      POSTGRES_PASSWORD: riva
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riva"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: riva.settings.clinic
      SECRET_KEY: "yerel-derleme-anahtari"
      DATABASE_URL: "postgres://riva:riva@db:5432/riva"
      DB_HOST: db
      SEED_DEMO: "1"        # yerel derlemede sahte demo verisi de yüklensin
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: .
    entrypoint: ["python", "manage.py", "run_scheduler"]
    environment:
      DJANGO_SETTINGS_MODULE: riva.settings.clinic
      SECRET_KEY: "yerel-derleme-anahtari"
      DATABASE_URL: "postgres://riva:riva@db:5432/riva"
      REMINDER_INTERVAL_SECONDS: "3600"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
