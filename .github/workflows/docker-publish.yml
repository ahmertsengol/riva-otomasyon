name: Docker imajını derle ve yayınla

# main'e her push'ta imajı derler ve GHCR'a (ghcr.io) "latest" olarak yükler.
# Klinik PC'sindeki Watchtower bu yeni imajı görüp uygulamayı otomatik günceller.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buildx kurulumu (gha cache desteği için)
        uses: docker/setup-buildx-action@v3

      - name: GHCR'a giriş
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: İmaj adını küçük harfe çevir
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derle ve yükle
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
