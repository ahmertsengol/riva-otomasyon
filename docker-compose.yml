# Riva Otomasyon — demo kurulumu (tek komut: docker compose up)
# Klinik PC'sinde sadece Docker Desktop kurulu olması yeterlidir.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: riva
      POSTGRES_USER: riva
      POSTGRES_PASSWORD: riva
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riva"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: riva.settings.dev
      DEBUG: "True"
      SECRET_KEY: "demo-secret-key-degistir-prod-icin"
      DATABASE_URL: "postgres://riva:riva@db:5432/riva"
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media        # yüklenen dosyalar (logo, fotoğraf) kalıcı olsun
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
