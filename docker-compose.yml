# Riva Otomasyon — KLİNİK kurulumu (oto-güncellemeli).
#   docker compose up -d
# GHCR'daki hazır imajı çeker; her `git push` sonrası GitHub Actions yeni imaj yayınlar
# ve buradaki Watchtower onu otomatik indirip uygulamayı günceller (build gerekmez).
# Kaynaktan derlemek için: docker compose -f docker-compose.build.yml up -d --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: riva
      POSTGRES_USER: riva
      POSTGRES_PASSWORD: riva
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riva"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    image: ghcr.io/ahmertsengol/riva-otomasyon:latest
    pull_policy: always
    environment:
      DJANGO_SETTINGS_MODULE: riva.settings.dev
      DEBUG: "True"
      SECRET_KEY: "demo-secret-key-degistir-prod-icin"
      DATABASE_URL: "postgres://riva:riva@db:5432/riva"
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media        # yüklenen dosyalar (logo, fotoğraf) kalıcı olsun
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      # Watchtower yalnızca bu etiketli konteyneri otomatik günceller
      com.centurylinklabs.watchtower.enable: "true"

  # Oto-güncelleyici: GHCR'ı periyodik kontrol eder, yeni imaj varsa web'i yeniler
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --label-enable --cleanup --include-restarting
    restart: unless-stopped

volumes:
  pgdata:
  media:
